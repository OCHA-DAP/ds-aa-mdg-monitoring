name: Monitor IMERG

on:
  schedule:
    - cron: '0 16 * * *' # run at 4pm UTC, after raster stats run at 3pm UTC
  workflow_dispatch:
    inputs:
      date:
        description: 'The center date to run for (in YYYY-MM-DD format)'
        required: false
        default: ''
      test:
        description: 'Send to test list with [test] subject prefix'
        required: false
        type: boolean
        default: false

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Keep schedule alive
        run: echo "Workflow keep-alive ping at $(date -u)"

  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11.4'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .
        python -m pip install -r requirements.txt

    - name: Build run command
      id: build_cmd
      run: |
        CMD="python pipelines/monitor_imerg.py"
        if [ -n "${{ github.event.inputs.date }}" ]; then
          CMD="$CMD --date ${{ github.event.inputs.date }}"
        fi
        if [ "${{ github.event.inputs.test }}" = "true" ]; then
          CMD="$CMD --test"
        fi
        echo "cmd=$CMD" >> $GITHUB_OUTPUT

    - name: Run script
      env:
        DSCI_AZ_BLOB_DEV_SAS_WRITE: ${{ secrets.DSCI_AZ_BLOB_DEV_SAS_WRITE }}
        DSCI_AZ_DB_PROD_HOST: ${{ secrets.DSCI_AZ_DB_PROD_HOST }}
        DSCI_AZ_DB_PROD_UID: ${{ secrets.DSCI_AZ_DB_PROD_UID }}
        DSCI_AZ_DB_PROD_PW: ${{ secrets.DSCI_AZ_DB_PROD_PW }}
        DSCI_LISTMONK_BASE_URL: ${{ secrets.DSCI_LISTMONK_BASE_URL }}
        DSCI_LISTMONK_API_USERNAME: ${{ secrets.DSCI_LISTMONK_API_USERNAME }}
        DSCI_LISTMONK_API_KEY: ${{ secrets.DSCI_LISTMONK_API_KEY }}
      run: ${{ steps.build_cmd.outputs.cmd }}
